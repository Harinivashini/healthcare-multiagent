version: "3.9"

# ────────────────────────────────────────────────────────────────────────────
# Healthcare MultiAgent Demo — Docker Compose
# Usage:  docker-compose up --build
# ────────────────────────────────────────────────────────────────────────────

networks:
  healthcare_net:
    driver: bridge

volumes:
  sqlite_data:   # persists the SQLite DB between container restarts

services:

  # ── Python / FastAPI backend ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    container_name: healthcare_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-openai/gpt-oss-120b}
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - DB_PATH=/data/healthcare.db
    volumes:
      - sqlite_data:/data
    networks:
      - healthcare_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Next.js frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000
    container_name: healthcare_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - healthcare_net
